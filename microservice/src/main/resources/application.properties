spring.application.name=microservice

# Token strategy: jwt (Postgres-backed) | opaque (Redis-backed)
spring.profiles.active=opaque

spring.datasource.url=jdbc:postgresql://localhost:5432/security
spring.datasource.username=security
spring.datasource.password=security

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration


app.jwt.secret=change-me-to-a-secure-random-secret-of-at-least-32-chars
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=604800

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.topics.otp-request=otp.request
app.kafka.topics.partitions=1
app.kafka.topics.replicas=1

app.otp.secret-key=change-me-to-a-secure-random-secret-of-at-least-32-chars